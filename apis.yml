aid: openproject
name: OpenProject
description: >-
  OpenProject is an open source project management platform offering work
  package tracking, Gantt charts, agile boards, time tracking, BIM, and
  enterprise project portfolio management. The OpenProject APIv3 is a
  hypermedia (HAL+JSON) REST API that exposes work packages, projects, users,
  attachments, custom fields, and many other resources.
