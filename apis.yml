    description: >-
      The OpenProject API v3 is a hypermedia REST API (HATEOAS, HAL+JSON) for
      managing work packages, projects, users, time entries, attachments,
      custom fields, and other OpenProject resources. It supports session,
      basic, bearer (API token), and OAuth 2.0 authentication.
